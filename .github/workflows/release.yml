name: Release

on:
  push:
    tags:
      - 'v*'         # triggers on v1.0.0, v2.1.3, etc.

permissions:
  contents: write    # needed to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Extract tag metadata
      # ------------------------------------------------------------------
      - name: Parse tag
        id:   tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # 3. Create source tarball (.tar.gz)
      #    Excludes .git, node_modules, and GitHub workflow files
      # ------------------------------------------------------------------
      - name: Create source tarball
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          PROJECT="deepseek-hud-${VERSION}"
          ARCHIVE="${PROJECT}.tar.gz"

          # Copy to a temp directory with the right prefix
          mkdir -p /tmp/release
          tar czf "/tmp/release/${ARCHIVE}" \
            --transform "s,^,${PROJECT}/," \
            --exclude '.git' \
            --exclude '.gitignore' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.claude' \
            .

          echo "tarball=${ARCHIVE}" >> "$GITHUB_OUTPUT"
        id: tarball

      # ------------------------------------------------------------------
      # 4. Create distribution zip
      #    Same exclusions — ready for `unzip && install`
      # ------------------------------------------------------------------
      - name: Create distribution zip
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          PROJECT="deepseek-hud-${VERSION}"
          ARCHIVE="${PROJECT}.zip"

          # Copy to temp, zip, then move back
          mkdir -p /tmp/release /tmp/build/${PROJECT}
          cp -r . /tmp/build/${PROJECT}/
          cd /tmp/build
          zip -r "/tmp/release/${ARCHIVE}" "${PROJECT}" \
            -x "${PROJECT}/.git/*" \
            -x "${PROJECT}/.github/*" \
            -x "${PROJECT}/node_modules/*" \
            -x "${PROJECT}/.gitignore"

          echo "zip=${ARCHIVE}" >> "$GITHUB_OUTPUT"
        id: zip

      # ------------------------------------------------------------------
      # 5. Create GitHub Release & upload assets
      # ------------------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name:         "${{ steps.tag.outputs.version }}"
          tag_name:     "${{ steps.tag.outputs.version }}"
          generate_release_notes: true
          files: |
            /tmp/release/${{ steps.tarball.outputs.tarball }}
            /tmp/release/${{ steps.zip.outputs.zip }}
